services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      SHADOW_MODE: "true"
      MFA_PROVIDER: mock
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/continuous_auth
      REDIS_URL: redis://redis:6379
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: Continuous Auth
      WEBAUTHN_ORIGIN: http://localhost:4000
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: continuous_auth
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
